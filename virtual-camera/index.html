<!DOCTYPE html>
<html>
<head>
    <title>PhotographyCourses Virtual Camera</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="camera">

    <div class="lcd">
        <span id="mode">M</span>
        |
        <span id="shutter">1/250</span>
        |
        <span id="aperture">f/5.6</span>
        |
        ISO <span id="isoDisplay">200</span>
    </div>

    <div class="screen">
        <h2>Practice Scene</h2>
        <p id="result">Adjust your settings</p>
    </div>


    <div class="controls">

        <label>
            ISO
            <input type="range" id="iso" min="100" max="6400" step="100" value="200">
        </label>


        <label>
            Aperture
            <input type="range" id="apertureControl" min="1.4" max="22" step="0.1" value="5.6">
        </label>


        <label>
            Shutter Speed
            <input type="range" id="shutterControl" min="1" max="4000" value="250">
        </label>

    </div>

    <button onclick="takePhoto()">TAKE PHOTO</button>

</div>


<script src="camera.js"></script>

</body>
</html>
